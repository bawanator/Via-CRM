# Frequent Google sync — Vercel Hobby crons are once-a-day, so GitHub Actions
# triggers the same authenticated endpoint every 30 minutes. The nightly
# Vercel cron (vercel.json) stays as the belt-and-braces deep pass.
#
# Requires the repo secret CRON_SECRET (same value as the Vercel env var):
#   GitHub → Settings → Secrets and variables → Actions → New repository secret.
name: gmail-sync
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Trigger Vía OS Google sync
        run: |
          curl --silent --show-error --fail --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://os.viaprivate.com.au/api/cron/gmail-sync"
